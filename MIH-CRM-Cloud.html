<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIH CRM — Cloud</title>
<link rel="icon" type="image/png" href="milogo.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0c0b14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MIH CRM">
<link rel="apple-touch-icon" href="milogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f4f1fa; --panel:#ffffff; --ink:#15152a; --ink-soft:#2d2d55; --muted:#64748b;
  --line:#e7e0f3; --line-strong:#d9cff0;
  --primary:#7c3aed; --primary-hover:#6d28d9; --accent:#a855f7;
  --primary-soft:rgba(124,58,237,.08); --primary-soft2:rgba(124,58,237,.14);
  --dark:#0c0b14; --ok:#16a34a; --ok-soft:rgba(22,163,74,.12);
  --warn:#d97706; --warn-soft:rgba(217,119,6,.12);
  --danger:#dc2626; --danger-soft:rgba(220,38,38,.10);
  --radius:14px; --shadow:0 6px 24px rgba(15,23,42,.08); --shadow-lg:0 18px 50px rgba(124,58,237,.16);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Inter',system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
h1,h2,h3,.brandfont{font-family:'Space Grotesk','Inter',sans-serif}
a{color:var(--primary);text-decoration:none}
button{font-family:inherit}
.hidden{display:none!important}

.app{display:flex;min-height:100vh}
.sidebar{width:248px;background:linear-gradient(180deg,#0c0b14 0%,#1b1430 100%);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.brand{display:flex;align-items:center;gap:12px;padding:20px 18px 16px}
.brand img{width:46px;height:46px;border-radius:10px;object-fit:cover;background:#000;border:1px solid rgba(255,255,255,.12)}
.brand .b-name{font-weight:700;font-size:15px;line-height:1.1;letter-spacing:.3px}
.brand .b-tag{font-size:9.5px;letter-spacing:1.5px;color:var(--accent);font-weight:700;margin-top:3px}
.nav{display:flex;flex-direction:column;gap:3px;padding:8px 12px;flex:1}
.nav button{display:flex;align-items:center;gap:11px;background:transparent;border:0;color:#cdc7e0;padding:11px 13px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;text-align:left;width:100%;transition:.15s}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.active{background:var(--primary);color:#fff;box-shadow:0 6px 18px rgba(124,58,237,.45)}
.nav .ic{width:18px;text-align:center;font-size:15px}
.side-foot{padding:14px 16px;font-size:11px;color:#7d75a0;border-top:1px solid rgba(255,255,255,.08)}
.side-foot button{background:rgba(255,255,255,.06);color:#cdc7e0;border:0;border-radius:8px;padding:7px 10px;font-size:11px;cursor:pointer;margin:3px 4px 0 0}
.side-foot button:hover{background:rgba(255,255,255,.12);color:#fff}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.topbar h1{margin:0;font-size:21px;font-weight:700}
.topbar .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:14px}
.userchip{display:flex;align-items:center;gap:9px;position:relative}
.chipbtn{display:flex;align-items:center;gap:9px;background:0;border:0;cursor:pointer;padding:4px 6px;border-radius:10px}
.chipbtn:hover{background:var(--primary-soft)}
.chipbtn .caret{color:var(--muted);font-size:11px}
.optmenu{position:absolute;right:0;top:calc(100% + 8px);background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);z-index:90;min-width:210px;padding:6px}
.optmenu button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:0;border:0;padding:11px 12px;border-radius:8px;font-size:14px;color:var(--ink);cursor:pointer}
.optmenu button:hover{background:var(--primary-soft)}
.optmenu .ohead{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;padding:8px 12px 4px}
.optsep{height:1px;background:var(--line);margin:5px 4px}
.optver{text-align:center;font-size:10.5px;color:var(--muted);padding:8px 4px 4px;letter-spacing:.3px}
.avatar{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px}
.userchip .nm{font-size:13px;font-weight:600}
.userchip .em{font-size:11px;color:var(--muted)}

.content{padding:26px 28px 60px;max-width:1180px;width:100%}

.btn{display:inline-flex;align-items:center;gap:7px;background:var(--primary);color:#fff;border:0;border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{background:var(--primary-hover);transform:translateY(-1px)}
.btn.ghost{background:var(--primary-soft);color:var(--primary)}
.btn.ghost:hover{background:var(--primary-soft2)}
.btn.line{background:#fff;color:var(--ink-soft);border:1px solid var(--line-strong)}
.btn.line:hover{background:var(--bg);transform:none}
.btn.sm{padding:7px 11px;font-size:12px;border-radius:8px}
.btn.danger{background:var(--danger-soft);color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}

.grid{display:grid;gap:18px}
.stat-grid{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:20px}
.stat{padding:18px 20px;position:relative;overflow:hidden}
.stat .lbl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat .val{font-size:30px;font-weight:800;margin-top:6px;font-family:'Space Grotesk',sans-serif}
.stat .sub{font-size:12px;color:var(--muted);margin-top:3px}
.stat .ic{position:absolute;right:14px;top:14px;width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:19px;background:var(--primary-soft);color:var(--primary)}

.section-head{display:flex;align-items:center;justify-content:space-between;margin:2px 0 16px}
.section-head h2{margin:0;font-size:17px}

table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{text-align:left;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700;padding:11px 14px;border-bottom:1px solid var(--line)}
tbody td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:last-child td{border-bottom:0}
tbody tr:hover{background:var(--primary-soft)}
.t-name{font-weight:600}
.muted{color:var(--muted)}
.empty{padding:46px 20px;text-align:center;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:8px;opacity:.5}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;letter-spacing:.3px}
.badge.gray{background:#eceaf3;color:#5b5575}
.badge.purple{background:var(--primary-soft2);color:var(--primary)}
.badge.green{background:var(--ok-soft);color:var(--ok)}
.badge.amber{background:var(--warn-soft);color:var(--warn)}
.badge.red{background:var(--danger-soft);color:var(--danger)}
.owner-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--ink-soft)}
.owner-dot{width:9px;height:9px;border-radius:50%;display:inline-block}

.seg{display:inline-flex;background:#efeaf8;border-radius:9px;padding:3px}
.seg button{border:0;background:transparent;padding:6px 13px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
.seg button.on{background:#fff;color:var(--primary);box-shadow:var(--shadow)}

.overlay{position:fixed;inset:0;background:rgba(12,11,20,.55);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow:auto}
.modal{background:#fff;border-radius:16px;width:100%;max-width:640px;box-shadow:var(--shadow-lg);animation:pop .18s ease}
.modal.wide{max-width:900px}
@keyframes pop{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
.modal-head h3{margin:0;font-size:17px}
.modal-head .x{background:0;border:0;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
.modal-body{padding:20px 22px}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:var(--ink-soft)}
input,select,textarea{font-family:inherit;font-size:13.5px;padding:10px 12px;border:1px solid var(--line-strong);border-radius:9px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
textarea{resize:vertical;min-height:64px}
.hint{font-size:11.5px;color:var(--muted)}
.cust-pick{position:relative}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--line-strong);border-radius:10px;box-shadow:var(--shadow-lg);z-index:30;max-height:260px;overflow:auto}
.sr-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line);font-size:13px}
.sr-item:last-child{border-bottom:0}
.sr-item:hover{background:var(--primary-soft)}
.sr-new{color:var(--primary);font-weight:600}
.newcust{margin-top:12px;padding:14px;border:1px dashed var(--line-strong);border-radius:10px;background:var(--primary-soft)}

.li-item{border:1px solid var(--line-strong);border-radius:10px;padding:10px 11px;margin-bottom:9px;background:#fff}
.li-desc{width:100%;margin-bottom:8px}
.li-sub{display:flex;align-items:center;gap:8px}
.li-qty{width:60px;flex:0 0 auto;text-align:center}
.li-each{width:100px;flex:0 0 auto}
.li-x,.li-eq{color:var(--muted);font-size:13px}
.li-line{margin-left:auto;font-weight:700;font-size:14px;min-width:74px;text-align:right}
.li-del{background:var(--danger-soft);color:var(--danger);border:0;border-radius:8px;width:34px;height:38px;flex:0 0 auto;cursor:pointer;font-size:16px}
.bankrow .btn{margin-top:2px}
.totbox{margin-top:14px;margin-left:auto;width:280px;font-size:13.5px}
.totbox .r{display:flex;justify-content:space-between;padding:6px 0}
.totbox .r.tot{border-top:2px solid var(--ink);margin-top:6px;padding-top:10px;font-size:18px;font-weight:800;color:var(--primary)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;text-align:center;padding:6px 0}
.cal-cell{background:#fff;border:1px solid var(--line);border-radius:10px;min-height:96px;padding:7px 8px;cursor:pointer;transition:.12s;position:relative}
.cal-cell:hover{border-color:var(--line-strong);background:var(--primary-soft)}
.cal-cell.other{background:#faf9fd;opacity:.55}
.cal-cell.today{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft)}
.cal-cell .dnum{font-size:12px;font-weight:700;color:var(--ink-soft)}
.cal-cell.today .dnum{color:var(--primary)}
.cal-ev{font-size:10.5px;font-weight:600;color:#fff;border-radius:5px;padding:2px 5px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.cal-ev.done{opacity:.6}
.cal-nav{display:flex;align-items:center;gap:10px}
.cal-nav b{font-family:'Space Grotesk';font-size:16px;min-width:160px;text-align:center;display:inline-block}
/* agenda (list) view */
.ag-date{font-family:'Space Grotesk';font-weight:700;font-size:13.5px;color:var(--primary);margin:18px 0 9px;letter-spacing:.3px}
.ag-date:first-child{margin-top:2px}
.ag-pasthd{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin:24px 0 6px;border-top:1px solid var(--line);padding-top:16px}
.ag-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px;cursor:pointer;box-shadow:var(--shadow)}
.ag-card:hover{border-color:var(--line-strong)}
.ag-top{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.ag-time{font-weight:700;font-size:13px;color:var(--ink-soft)}
.ag-title{font-weight:600;font-size:15px;line-height:1.25}
.ag-cust{font-size:12.5px;color:var(--muted);margin-top:3px}
.ag-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;flex-wrap:wrap}

/* invoice doc */
.inv-doc{background:#fff;color:#1a1a1a;max-width:780px;margin:0 auto;font-size:12.5px}
.inv-head{background:#0c0b14;color:#fff;display:flex;justify-content:space-between;align-items:flex-start;padding:22px 26px}
.inv-head .lhs{display:flex;gap:16px;align-items:flex-start}
.inv-head img{width:78px;height:78px;border-radius:10px;object-fit:cover;background:#000}
.inv-head .co{font-family:'Space Grotesk';font-size:23px;font-weight:700;letter-spacing:.5px;line-height:1.05}
.inv-head .tag{color:var(--accent);font-size:11px;font-weight:700;letter-spacing:1px;margin:4px 0 9px}
.inv-head .ci{font-size:11px;color:#d6d1e6;line-height:1.7}
.inv-stamp{background:#fff;border:2px solid var(--primary);border-radius:10px;text-align:center;min-width:158px;overflow:hidden}
.inv-stamp .t{background:#0c0b14;color:#fff;font-family:'Space Grotesk';font-weight:700;letter-spacing:3px;font-size:15px;padding:7px}
.inv-stamp .n{font-weight:800;font-size:17px;padding:8px 0 2px;color:#15152a;font-family:'Space Grotesk'}
.inv-stamp .d{font-size:11px;color:#555;padding:0 0 8px}
.inv-accent{height:5px;background:linear-gradient(90deg,var(--primary),var(--accent))}
.inv-body{padding:22px 26px}
.inv-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.inv-panel{border:1px solid #e3e3e3;border-radius:8px;overflow:hidden}
.inv-panel .ph{background:#f3f1f7;font-weight:700;font-size:11px;letter-spacing:.6px;text-transform:uppercase;padding:9px 12px;border-bottom:1px solid #e3e3e3}
.inv-panel .pb{padding:12px}
.inv-panel .pb .big{font-weight:700;font-size:14px;margin-bottom:4px}
.inv-kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:11.5px}
.inv-kv b{font-weight:700}
.inv-sec-title{font-family:'Space Grotesk';font-weight:700;font-size:15px;margin:4px 0 10px}
table.inv-items{border:1px solid #e3e3e3;border-radius:8px;overflow:hidden}
table.inv-items th{background:#1a1726;color:#fff;text-transform:none;letter-spacing:0;font-size:11.5px;padding:9px 12px}
table.inv-items th.r,table.inv-items td.r{text-align:right}
table.inv-items td{padding:9px 12px;border-bottom:1px solid #eee;font-size:12px}
.inv-foot-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px;align-items:start}
.inv-total{border:2px solid var(--primary);border-radius:10px;background:#f7f4fc;padding:22px;display:flex;justify-content:space-between;align-items:center}
.inv-total .l{font-family:'Space Grotesk';font-weight:700;font-size:18px}
.inv-total .v{font-family:'Space Grotesk';font-weight:800;font-size:24px;color:var(--primary)}
.inv-services{background:#0c0b14;color:#fff;margin-top:22px}
.inv-services .acc{height:4px;background:linear-gradient(90deg,var(--primary),var(--accent))}
.inv-services .sv{padding:16px 26px}
.inv-services .sh{font-weight:700;letter-spacing:.6px;font-size:12px;margin-bottom:7px}
.inv-services .sl{font-size:11px;color:#cfc9e0;line-height:1.8}
.inv-thanks{text-align:center;color:#999;font-size:11px;padding:14px}

/* auth / config screens */
.gate{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(135deg,#1a0f3a 0%,#4c1d95 55%,#7c3aed 100%);z-index:500;padding:20px}
.gate-card{background:#fff;border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.35);width:100%;max-width:420px;padding:34px 32px;text-align:center}
.gate-card img{width:72px;height:72px;border-radius:16px;object-fit:cover;background:#000;margin-bottom:14px}
.gate-card h2{margin:0 0 4px;font-size:22px}
.gate-card .tag{color:var(--accent);font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:22px}
.gbtn{display:inline-flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line-strong);border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;width:100%;justify-content:center}
.gbtn:hover{background:var(--bg)}
.gbtn img{width:18px;height:18px;margin:0;border-radius:0;background:0}
.gate-card .err{color:var(--danger);font-size:12.5px;margin-top:14px}
.gate-card .field{text-align:left;margin-bottom:12px}

@media print{
  body{background:#fff}
  .app .sidebar,.topbar,.no-print{display:none!important}
  .main,.content{padding:0!important;margin:0!important;max-width:none!important}
  .inv-doc{max-width:none}
  @page{margin:12mm}
}
.mobilenav{display:none}
@media(max-width:860px){
  .sidebar{display:none}
  .frow{grid-template-columns:1fr}
  .inv-cols,.inv-foot-cols{grid-template-columns:1fr}
  .content .grid:not(.stat-grid){grid-template-columns:1fr!important}
  .topbar{flex-wrap:wrap;gap:8px;padding:12px 16px}
  .topbar h1{font-size:18px}
  .topbar-right{gap:8px;flex-wrap:wrap}
  .userchip .nm,.userchip .em{display:none}
  .content{padding:18px 14px 96px}
  .card{overflow-x:auto}
  .cal-grid{min-width:520px}
  .seg button{padding:6px 10px;font-size:12px}
  /* stack data tables into readable cards (no horizontal zoom) */
  #content table,#content thead,#content tbody,#content tr,#content td{display:block}
  #content thead{display:none}
  #content tr{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fff;padding:3px 2px}
  #content tr:hover{background:#fff}
  #content td{border:0!important;padding:7px 14px;text-align:left!important}
  #content td:empty{display:none}
  #content td .btn,#content td a.btn{margin:3px 6px 3px 0}
  .mobilenav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;background:#0c0b14;border-top:1px solid rgba(255,255,255,.1);padding:6px 4px;padding-bottom:calc(6px + env(safe-area-inset-bottom))}
  .mobilenav button{flex:1;background:0;border:0;color:#9c95bb;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;font-size:10px;font-weight:600;cursor:pointer}
  .mobilenav button.active{color:#fff}
  .mobilenav .ic{font-size:18px;line-height:1}
  .mobilenav button.active .ic{color:var(--accent)}
}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);z-index:600;animation:pop .2s}
.updbar{position:fixed;left:50%;transform:translateX(-50%);bottom:88px;z-index:700;background:var(--primary);color:#fff;padding:10px 14px 10px 18px;border-radius:30px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:12px;font-size:13px;font-weight:600;animation:pop .2s}
.updbar button{background:#fff;color:var(--primary);border:0;border-radius:20px;padding:7px 14px;font-weight:700;cursor:pointer}
.loading{position:fixed;inset:0;display:grid;place-items:center;background:var(--bg);z-index:400;color:var(--muted);font-size:14px}
.spin{width:26px;height:26px;border:3px solid var(--line-strong);border-top-color:var(--primary);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<script>
/* =====================================================================
   MIH CRM — CLOUD (Supabase, shared workspace, Google sign-in)
   ===================================================================== */
const CFG_KEY='mih_sb_cfg';
const APP_VERSION='2026.06.29-22';   /* bump this when deploying; phones auto-refresh to match */
const GST_DIVISOR=11;
const CAL_SCOPE='https://www.googleapis.com/auth/calendar';
const OAUTH_SCOPES='https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/spreadsheets';
const DEFAULT_SETTINGS={
  businessName:'Massive Integrated Homes', tagline:'SMARTER HOMES. BETTER LIVING.',
  mobile:'0480 568 180', email:'Nathaniel@massiveintegratedhomes.com.au',
  website:'www.massiveintegratedhomes.com.au', abn:'62 834 287 138',
  bankName:'Nathaniel Pemberton', bsb:'067-873', accountNumber:'17643364',
  bankAccounts:[
    {label:'Nathaniel Pemberton', name:'Nathaniel Pemberton', bsb:'067-873', account:'17643364'},
    {label:'Mitchell Singe', name:'Mitchell Singe', bsb:'067-873', account:'1997 6285'}
  ],
  services:'TV Wall Mounting | Home Automation | Smart Home Integration | Security & CCTV\nWiFi & Networking | Multi-Room Audio | Home Theatre | Commercial AV',
  calendarEmbed:'', googleCalendarId:'', lastSync:'', reviewUrl:'https://g.page/r/CbVjKnqoixi-EAE/review',
  googleSheetId:'https://docs.google.com/spreadsheets/d/1ZHmpAxzOo2GPfGIzrReMztPKNP3MBYi23neekylLZjc/edit', lastSheetSync:''
};
const DEFAULT_SHEET='1ZHmpAxzOo2GPfGIzrReMztPKNP3MBYi23neekylLZjc';
let sb=null, me=null;
let DB={customers:[],jobs:[],invoices:[],expenses:[],loans:[],loanEntries:[],members:[],settings:{...DEFAULT_SETTINGS},counters:{invoice:2,quote:0},financialsReady:false};
const EXP_CATS=['Materials','Subcontractor','Fuel','Vehicle','Tools & Equipment','Subscriptions','Insurance','Phone & Internet','Marketing','Office','Bank/Fees','Other'];
const GAuth={token:null,connected:false,calendars:[],needReconnect:false};

/* ---------- helpers ---------- */
const uid=()=> (crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2));
const money=n=>'$'+(Number(n)||0).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmtDate(d){ if(!d) return ''; const x=new Date(d+'T00:00:00'); return x.toLocaleDateString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2400); }
const val=id=>{ const e=document.getElementById(id); return e?e.value:''; };
const custById=id=>DB.customers.find(c=>c.id===id);
function custName(id){ const c=custById(id); return c?c.name:'—'; }
function memberByEmail(email){ return DB.members.find(m=>(m.email||'').toLowerCase()===(email||'').toLowerCase()); }
function ownerColor(o){ const m=DB.members.find(x=>x.id===o||(x.email||'').toLowerCase()===(o||'').toLowerCase()||x.name===o); return (m&&m.color)||'#7c3aed'; }
function initials(name){ return (name||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

/* =====================================================================
   BOOT + AUTH
   ===================================================================== */
async function boot(){
  const cfg=getCfg();
  if(!cfg){ hide('loading'); return showConfig(); }
  try{ sb=window.supabase.createClient(cfg.url,cfg.anonKey); }
  catch(e){ hide('loading'); return showConfig('Could not initialise — check your URL and key.'); }
  // capture provider_token returned in the URL hash right after Google redirect
  const { data:{ session } } = await sb.auth.getSession();
  sb.auth.onAuthStateChange((_e,s)=>{ if(s){ onSignedIn(s);} else { showLogin(); } });
  if(session){ onSignedIn(session); } else { hide('loading'); showLogin(); }
}
function getCfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY)||'null'); }catch(e){ return null; } }
function hide(id){ const e=document.getElementById(id); if(e) e.classList.add('hidden'); }
function show(id){ const e=document.getElementById(id); if(e) e.classList.remove('hidden'); }

function showConfig(err){
  document.getElementById('gateRoot').innerHTML=`
   <div class="gate"><div class="gate-card">
     <img src="milogo.png" onerror="this.style.display='none'">
     <h2>Connect your workspace</h2>
     <div class="tag">MIH CRM · CLOUD</div>
     <div class="field"><label>Supabase Project URL</label><input id="cfg_url" placeholder="https://xxxx.supabase.co"></div>
     <div class="field"><label>Supabase anon (public) key</label><input id="cfg_key" placeholder="eyJhbGci..."></div>
     <button class="btn" style="width:100%;justify-content:center" onclick="saveCfg()">Save & continue</button>
     <div class="hint" style="margin-top:14px;text-align:left">Find these in Supabase → Project Settings → API. The anon key is safe to use here (your data is protected by row-level security). One-time per device.</div>
     ${err?`<div class="err">${esc(err)}</div>`:''}
   </div></div>`;
}
function saveCfg(){
  const url=val('cfg_url').trim().replace(/\/$/,''), key=val('cfg_key').trim();
  if(!/^https:\/\/.+\.supabase\.co$/.test(url)){ return showConfig('That URL doesn’t look right (https://xxxx.supabase.co).'); }
  if(key.length<30){ return showConfig('That anon key looks too short.'); }
  localStorage.setItem(CFG_KEY,JSON.stringify({url,anonKey:key}));
  document.getElementById('gateRoot').innerHTML=''; show('loading'); boot();
}
function showLogin(err){
  document.getElementById('appRoot').classList.add('hidden');
  document.getElementById('gateRoot').innerHTML=`
   <div class="gate"><div class="gate-card">
     <img src="milogo.png" onerror="this.style.display='none'">
     <h2>MIH CRM</h2>
     <div class="tag">SMARTER HOMES. BETTER LIVING.</div>
     <button class="gbtn" onclick="signIn()">
       <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" onerror="this.style.display='none'"> Sign in with Google
     </button>
     <div class="hint" style="margin-top:16px">Use your Massive Integrated Homes Google account. Access is limited to approved team members.</div>
     ${err?`<div class="err">${esc(err)}</div>`:''}
     <div class="hint" style="margin-top:18px"><a href="#" onclick="resetCfg();return false">Change workspace connection</a></div>
   </div></div>`;
}
function resetCfg(){ localStorage.removeItem(CFG_KEY); location.reload(); }
async function signIn(){
  const { error } = await sb.auth.signInWithOAuth({ provider:'google',
    options:{ scopes:OAUTH_SCOPES, queryParams:{ access_type:'offline', prompt:'consent' },
      redirectTo: location.origin+location.pathname } });
  if(error) showLogin(error.message);
}
async function signOut(){ await sb.auth.signOut(); GAuth.token=null; GAuth.connected=false; location.reload(); }

function saveGTok(t){ try{ localStorage.setItem('mih_gtok',JSON.stringify({t,e:Date.now()+3300000})); }catch(e){} }
function loadGTok(){ try{ const o=JSON.parse(localStorage.getItem('mih_gtok')||'null'); if(o&&o.e>Date.now()) return o.t; localStorage.removeItem('mih_gtok'); }catch(e){} return null; }
async function onSignedIn(session){
  show('loading');
  if(session.provider_token){ GAuth.token=session.provider_token; GAuth.connected=true; GAuth.needReconnect=false; saveGTok(session.provider_token); }
  else { const t=loadGTok(); if(t){ GAuth.token=t; GAuth.connected=true; } }
  try{
    await loadMembers();
    if(!memberByEmail(session.user.email)){
      hide('loading'); await sb.auth.signOut();
      return showLogin('This account isn’t on the team list yet. Ask an admin to add '+session.user.email+' in Supabase.');
    }
    const m=memberByEmail(session.user.email);
    me={ id:session.user.id, email:session.user.email, name:(m&&m.name)||session.user.user_metadata.full_name||session.user.email, color:(m&&m.color)||'#7c3aed' };
    await loadAll();
    document.getElementById('gateRoot').innerHTML='';
    hide('loading'); show('appRoot');
    renderUserChip();
    render();
  }catch(e){ console.error(e); hide('loading'); showLogin('Could not load your workspace: '+(e.message||e)); }
}
function renderUserChip(){
  document.getElementById('userChip').innerHTML=`
    <button class="chipbtn" onclick="toggleOptions(event)" aria-label="Menu">
      <div class="avatar" style="background:${esc(me.color)}">${esc(initials(me.name))}</div>
      <div class="who"><div class="nm">${esc(me.name)}</div><div class="em">${esc(me.email)}</div></div>
      <span class="caret">▾</span>
    </button>
    <div id="optMenu" class="optmenu hidden">
      <div class="ohead">Create</div>
      <button onclick="closeOptions();openJob()">📅 Schedule job</button>
      <button onclick="closeOptions();openCustomer()">➕ Add customer</button>
      <button onclick="closeOptions();invMode='invoice';openInvoice(null,null,null,'invoice')">🧾 New invoice</button>
      <button onclick="closeOptions();invMode='quote';openInvoice(null,null,null,'quote')">❝ New quote</button>
      <button onclick="closeOptions();openExpense()">＄ Add expense</button>
      <div class="optsep"></div>
      <button onclick="closeOptions();go('financials')">＄ Financials</button>
      <button onclick="closeOptions();go('settings')">⚙ Settings</button>
      <button onclick="closeOptions();syncNow()">⟳ Sync calendar</button>
      <div class="optsep"></div>
      <button onclick="closeOptions();signOut()">⎋ Sign out (${esc(me.name)})</button>
      <div class="optver">MIH CRM · v${esc(APP_VERSION)}</div>
    </div>`;
  const team=DB.members.map(m=>`<span class="owner-tag"><span class="owner-dot" style="background:${esc(m.color||'#7c3aed')}"></span>${esc(m.name||m.email)}</span>`).join('<br>');
  document.getElementById('teamFoot').innerHTML='Team:<br>'+team;
}
function toggleOptions(e){ if(e) e.stopPropagation(); const m=document.getElementById('optMenu'); if(m) m.classList.toggle('hidden'); }
function closeOptions(){ const m=document.getElementById('optMenu'); if(m) m.classList.add('hidden'); }
document.addEventListener('click',e=>{ const m=document.getElementById('optMenu'); if(m&&!m.classList.contains('hidden')&&!e.target.closest('.userchip')) m.classList.add('hidden'); });

/* =====================================================================
   DATA LAYER (Supabase)  — mapping snake_case rows <-> app objects
   ===================================================================== */
const rowToCust=r=>({id:r.id,name:r.name,contact:r.contact,phone:r.phone,email:r.email,abn:r.abn,address:r.address,notes:r.notes,ownerId:r.owner_id,ownerName:r.owner_name});
const custToRow=c=>({id:c.id,name:c.name,contact:c.contact,phone:c.phone,email:c.email,abn:c.abn,address:c.address,notes:c.notes,owner_id:c.ownerId,owner_name:c.ownerName,updated_at:new Date().toISOString()});
const rowToJob=r=>({id:r.id,title:r.title,customerId:r.customer_id,date:r.date,time:r.time,duration:Number(r.duration)||2,status:r.status,notes:r.notes,value:(r.value!=null?Number(r.value):null),googleEventId:r.google_event_id,calendarId:r.calendar_id,source:r.source,ownerId:r.owner_id,ownerName:r.owner_name});
const jobToRow=j=>({id:j.id,title:j.title,customer_id:j.customerId||null,date:j.date||null,time:j.time||null,duration:j.duration||2,status:j.status,notes:j.notes,value:(j.value!=null&&j.value!==''?Number(j.value):null),google_event_id:j.googleEventId||null,calendar_id:j.calendarId||null,source:j.source||'local',owner_id:j.ownerId,owner_name:j.ownerName,updated_at:new Date().toISOString()});
const rowToExp=r=>({id:r.id,jobId:r.job_id,date:r.date,category:r.category,description:r.description,amount:Number(r.amount)||0,gstInc:r.gst_inc!==false,recurring:r.recurring||'',receiptPath:r.receipt_path||'',ownerId:r.owner_id,ownerName:r.owner_name});
const expToRow=e=>({id:e.id,job_id:e.jobId||null,date:e.date||null,category:e.category,description:e.description,amount:e.amount||0,gst_inc:e.gstInc!==false,recurring:e.recurring||null,receipt_path:e.receiptPath||null,owner_id:e.ownerId,owner_name:e.ownerName,updated_at:new Date().toISOString()});
const rowToLoan=r=>({id:r.id,name:r.name,type:r.type||'business',openingBalance:Number(r.opening_balance)||0,notes:r.notes||'',ownerId:r.owner_id,ownerName:r.owner_name});
const loanToRow=l=>({id:l.id,name:l.name,type:l.type||'business',opening_balance:l.openingBalance||0,notes:l.notes||'',owner_id:l.ownerId,owner_name:l.ownerName,updated_at:new Date().toISOString()});
const rowToLE=r=>({id:r.id,loanId:r.loan_id,date:r.date,kind:r.kind||'repayment',amount:Number(r.amount)||0,note:r.note||'',ownerId:r.owner_id,ownerName:r.owner_name});
const leToRow=x=>({id:x.id,loan_id:x.loanId,date:x.date||null,kind:x.kind||'repayment',amount:x.amount||0,note:x.note||'',owner_id:x.ownerId,owner_name:x.ownerName});
const rowToInv=r=>({id:r.id,number:r.number,date:r.date,customerId:r.customer_id,project:r.project,commenced:r.commenced,completed:r.completed,status:r.status,lines:r.lines||[],bank:r.bank||null,sentAt:r.sent_at||null,type:r.type||'invoice',ownerId:r.owner_id,ownerName:r.owner_name});
const invToRow=i=>({id:i.id,number:i.number,date:i.date||null,customer_id:i.customerId||null,project:i.project,commenced:i.commenced||null,completed:i.completed||null,status:i.status,lines:i.lines,bank:i.bank||null,sent_at:i.sentAt||null,type:i.type||'invoice',owner_id:i.ownerId,owner_name:i.ownerName,updated_at:new Date().toISOString()});

async function loadMembers(){
  const {data,error}=await sb.from('members').select('*');
  if(error) throw error; DB.members=data||[];
}
async function loadAll(){
  const [cs,js,iv,st]=await Promise.all([
    sb.from('customers').select('*'),
    sb.from('jobs').select('*'),
    sb.from('invoices').select('*'),
    sb.from('settings').select('*').eq('id',1).maybeSingle()
  ]);
  if(cs.error||js.error||iv.error) throw (cs.error||js.error||iv.error);
  DB.customers=(cs.data||[]).map(rowToCust);
  DB.jobs=(js.data||[]).map(rowToJob);
  DB.invoices=(iv.data||[]).map(rowToInv);
  DB.settings=Object.assign({...DEFAULT_SETTINGS},(st&&st.data&&st.data.data)||{});
  DB.counters.invoice=DB.invoices.reduce((m,i)=>{const x=/MIH-(\d+)/.exec(i.number||'');return x?Math.max(m,+x[1]):m;},2);
  DB.counters.quote=DB.invoices.reduce((m,i)=>{const x=/QUO-(\d+)/.exec(i.number||'');return x?Math.max(m,+x[1]):m;},0);
  await loadFinancials();
}
async function loadFinancials(){
  DB.expenses=[];DB.loans=[];DB.loanEntries=[];DB.financialsReady=false;
  try{
    const [ex,ln,le]=await Promise.all([sb.from('expenses').select('*'),sb.from('loans').select('*'),sb.from('loan_entries').select('*')]);
    if(ex.error) return; // financials tables not created yet
    DB.expenses=(ex.data||[]).map(rowToExp);
    DB.loans=(ln.error?[]:(ln.data||[])).map(rowToLoan);
    DB.loanEntries=(le.error?[]:(le.data||[])).map(rowToLE);
    DB.financialsReady=true;
  }catch(e){ DB.financialsReady=false; }
}
async function upsertCust(c){ const {error}=await sb.from('customers').upsert(custToRow(c)); if(error)throw error; }
async function upsertJob(j){
  const row=jobToRow(j);
  let {error}=await sb.from('jobs').upsert(row);
  if(error && /value/i.test(error.message||'')){ delete row.value; const r2=await sb.from('jobs').upsert(row); error=r2.error; }
  if(error) throw error;
}
async function upsertExp(e){ const {error}=await sb.from('expenses').upsert(expToRow(e)); if(error)throw error; }
async function upsertLoan(l){ const {error}=await sb.from('loans').upsert(loanToRow(l)); if(error)throw error; }
async function upsertLE(x){ const {error}=await sb.from('loan_entries').upsert(leToRow(x)); if(error)throw error; }
async function uploadReceipt(file){
  const ext=((file.name||'jpg').split('.').pop()||'jpg').toLowerCase();
  const path=me.id+'/'+uid()+'.'+ext;
  const {error}=await sb.storage.from('receipts').upload(path,file,{upsert:false,contentType:file.type||'image/jpeg'});
  if(error) throw error; return path;
}
async function receiptUrl(path){ if(!path) return ''; const {data,error}=await sb.storage.from('receipts').createSignedUrl(path,3600); return error?'':data.signedUrl; }
async function upsertInv(i){
  const row=invToRow(i);
  // tolerate optional columns that may not be migrated yet (bank, sent_at, job_id)
  const optional=['bank','sent_at','job_id','type'];
  for(let n=0;n<4;n++){
    const {error}=await sb.from('invoices').upsert(row);
    if(!error) return;
    const msg=error.message||'';
    const miss=optional.find(col=>(col in row) && msg.includes(col));
    if(miss){ delete row[miss]; continue; }
    throw error;
  }
  throw new Error('Invoice save failed (schema)');
}
async function delRow(table,id){ const {error}=await sb.from(table).delete().eq('id',id); if(error)throw error; }
async function saveSettingsRow(){ const {error}=await sb.from('settings').upsert({id:1,data:DB.settings}); if(error)throw error; }

/* =====================================================================
   ROUTING
   ===================================================================== */
let currentView='dashboard';
let ownerFilter='all';
['nav','mobileNav'].forEach(navId=>{ const n=document.getElementById(navId); if(n) n.addEventListener('click',e=>{ const b=e.target.closest('button[data-view]'); if(b) go(b.dataset.view); }); });
function go(v){ currentView=v; document.querySelectorAll('#nav button, #mobileNav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); render(); window.scrollTo(0,0); }
const TITLES={dashboard:['Dashboard',()=> 'Shared workspace · '+DB.members.length+' team members'],customers:['Customers','Your shared client database'],calendar:['Calendar & Jobs','Everyone’s bookings in one place'],invoices:['Invoices','Create and manage invoices'],financials:['Financials','Costs, profit, receipts & loans'],settings:['Settings','Business details & integrations']};
function render(){
  const [t,s]=TITLES[currentView];
  document.getElementById('viewTitle').textContent=t;
  document.getElementById('viewSub').textContent=typeof s==='function'?s():s;
  document.getElementById('topAction').innerHTML='';
  ({dashboard:viewDashboard,customers:viewCustomers,calendar:viewCalendar,invoices:viewInvoices,financials:viewFinancials,settings:viewSettings}[currentView])();
}
function mineOnly(arr){ return ownerFilter==='mine'?arr.filter(x=>x.ownerId===me.id):arr; }
function ownerTag(x){ const name=x.ownerName||'—'; return `<span class="owner-tag"><span class="owner-dot" style="background:${esc(ownerColor(x.ownerId)|| '#7c3aed')}"></span>${esc(name)}</span>`; }
function filterSeg(){ return `<div class="seg"><button class="${ownerFilter==='all'?'on':''}" onclick="ownerFilter='all';render()">Everyone</button><button class="${ownerFilter==='mine'?'on':''}" onclick="ownerFilter='mine';render()">Mine</button></div>`; }

/* =====================================================================
   DASHBOARD
   ===================================================================== */
function emptyState(ic,t,s){ return `<div class="empty"><div class="big">${ic}</div><div style="font-weight:600;color:var(--ink-soft)">${t}</div><div style="font-size:12.5px;margin-top:4px">${s}</div></div>`; }
function stat(lbl,v,sub,ic){ return `<div class="card stat"><div class="ic">${ic}</div><div class="lbl">${lbl}</div><div class="val">${v}</div><div class="sub">${sub}</div></div>`; }
function viewDashboard(){
  document.getElementById('topAction').innerHTML=filterSeg();
  const jobs=mineOnly(DB.jobs), invs=mineOnly(DB.invoices).filter(i=>i.type!=='quote');
  const upcoming=jobs.filter(j=>j.date>=todayISO()&&j.status!=='done').sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const unpaid=invs.filter(i=>i.status!=='paid');
  const outstanding=unpaid.reduce((s,i)=>s+invTotal(i),0);
  const collected=invs.filter(i=>i.status==='paid').reduce((s,i)=>s+invTotal(i),0);
  document.getElementById('content').innerHTML=`
  <div class="grid stat-grid" style="margin-bottom:22px">
    ${stat('Customers',mineOnly(DB.customers).length,'in your database','◍')}
    ${stat('Upcoming jobs',upcoming.length,'scheduled ahead','▤')}
    ${stat('Outstanding',money(outstanding),unpaid.length+' unpaid','▣')}
    ${stat('Collected',money(collected),'paid to date','✓')}
  </div>
  <div class="grid" style="grid-template-columns:1.3fr 1fr;align-items:start">
    <div class="card pad">
      <div class="section-head"><h2>Upcoming jobs</h2><button class="btn ghost sm" onclick="openJob()">+ Schedule</button></div>
      ${upcoming.length?`<table><tbody>${upcoming.slice(0,8).map(j=>`
        <tr style="cursor:pointer" onclick="openJob('${j.id}')">
          <td style="width:96px"><div class="t-name">${fmtDate(j.date)}</div><div class="muted" style="font-size:11px">${esc(j.time||'')}</div></td>

let calYear,calMonth,calMode=null;
function viewCalendar(){
  const isMobile=window.matchMedia('(max-width:860px)').matches;
  if(calMode===null) calMode=isMobile?'agenda':'month';
  const now=new Date(); if(calYear==null){ calYear=now.getFullYear(); calMonth=now.getMonth(); }
  document.getElementById('topAction').innerHTML=filterSeg()+`<button class="btn" style="margin-left:12px" onclick="openJob()">+ Schedule job</button>`;
  const gbtn=GAuth.connected?`<button class="btn ghost sm" onclick="syncNow()">⟳ Sync Google</button>`:`<button class="btn line sm" onclick="reconnectCal()">Connect Google</button>`;
  const toggle=`<div class="seg"><button class="${calMode==='agenda'?'on':''}" onclick="setCalMode('agenda')">List</button><button class="${calMode==='month'?'on':''}" onclick="setCalMode('month')">Month</button></div>`;
  if(calMode==='agenda'){
    document.getElementById('content').innerHTML=`<div class="card pad">
      <div class="section-head"><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">${toggle}${gbtn}</div></div>
      <div id="agenda"></div></div>`;
    renderAgenda();
  } else {
    const monthName=new Date(calYear,calMonth,1).toLocaleDateString('en-AU',{month:'long',year:'numeric'});
    document.getElementById('content').innerHTML=`
      <div class="card pad" style="margin-bottom:18px">
        <div class="section-head">
          <div class="cal-nav"><button class="btn line sm" onclick="calStep(-1)">‹</button><b>${monthName}</b><button class="btn line sm" onclick="calStep(1)">›</button><button class="btn ghost sm" onclick="calToday()">Today</button></div>
          <div style="display:flex;gap:8px;align-items:center">${toggle}${gbtn}</div>
        </div>
        <div class="cal-grid">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
        <div class="cal-grid" id="calCells"></div>
        <div style="margin-top:12px">${DB.members.map(m=>`<span class="owner-tag" style="margin-right:14px"><span class="owner-dot" style="background:${esc(m.color||'#7c3aed')}"></span>${esc(m.name||m.email)}</span>`).join('')}</div>
      </div>
      <div class="card pad"><div class="section-head"><h2>All jobs</h2></div><div id="jobList"></div></div>`;
    renderCalCells(); renderJobList();
  }
}
function setCalMode(m){ calMode=m; viewCalendar(); }
function renderAgenda(){
  const el=document.getElementById('agenda'); if(!el) return;
  const today=todayISO();
  const jobs=mineOnly([...DB.jobs]).sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||'').localeCompare(b.time||''));
  if(!jobs.length){ el.innerHTML=emptyState('▤','No jobs scheduled','Tap “Schedule job” to add one.'); return; }
  const upcoming=jobs.filter(j=>(j.date||'')>=today);
  const past=jobs.filter(j=>(j.date||'')<today).reverse();
  let html=upcoming.length?groupAgenda(upcoming,today):`<div class="hint" style="margin:6px 0 2px">No upcoming jobs — see earlier ones below.</div>`;
  if(past.length) html+=`<div class="ag-pasthd">Earlier jobs</div>`+groupAgenda(past,today);
  el.innerHTML=html;
}
function groupAgenda(list,today){
  let html='',last=null;
  for(const j of list){ if(j.date!==last){ last=j.date; html+=`<div class="ag-date">${agendaDateLabel(j.date,today)}</div>`; } html+=agendaCard(j); }
  return html;
}
function agendaDateLabel(d,today){
  if(!d) return 'No date';
  const long=new Date(d+'T00:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
  const tm=new Date(Date.now()+864e5).toISOString().slice(0,10);
  if(d===today) return 'Today · '+long;
  if(d===tm) return 'Tomorrow · '+long;
  return long;
}
function agendaCard(j){
  const c=custById(j.customerId);
  return `<div class="ag-card" style="border-left:4px solid ${esc(ownerColor(j.ownerId))}" onclick="openJob('${j.id}')">
    <div class="ag-top"><span class="ag-time">${esc(j.time||'—')}</span>${jobBadge(j.status)}</div>
    <div class="ag-title">${esc(j.title)}</div>
    ${c?`<div class="ag-cust">${esc(c.name)}${c.address?' · '+esc(c.address):''}</div>`:''}
    <div class="ag-foot"><span class="owner-tag"><span class="owner-dot" style="background:${esc(ownerColor(j.ownerId))}"></span>${esc(j.ownerName||'')}</span><span onclick="event.stopPropagation()">${jobQuickActions(j)}</span></div>
  </div>`;
}
function calStep(d){ calMonth+=d; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} renderCalCells(); }
function calToday(){ const n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); renderCalCells(); }
function renderCalCells(){
  const start=new Date(calYear,calMonth,1).getDay();
  const daysIn=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const today=todayISO(); const jobs=mineOnly(DB.jobs); const cells=[];
  for(let i=0;i<42;i++){
    let dayNum,mo,yr,other=false;
    if(i<start){ dayNum=prevDays-start+1+i; mo=calMonth-1; yr=calYear; other=true; }
    else if(i>=start+daysIn){ dayNum=i-start-daysIn+1; mo=calMonth+1; yr=calYear; other=true; }
    else { dayNum=i-start+1; mo=calMonth; yr=calYear; }
    let m=mo,y=yr; if(m<0){m=11;y--;} if(m>11){m=0;y++;}
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const evs=jobs.filter(j=>j.date===iso);
    cells.push(`<div class="cal-cell ${other?'other':''} ${iso===today?'today':''}" onclick="openJob(null,'${iso}')">
      <div class="dnum">${dayNum}</div>
      ${evs.slice(0,3).map(j=>`<div class="cal-ev ${j.status==='done'?'done':''}" style="background:${esc(ownerColor(j.ownerId))}" onclick="event.stopPropagation();openJob('${j.id}')" title="${esc(j.title)} — ${esc(j.ownerName||'')}">${j.status==='done'?'✓ ':''}${esc(j.time?j.time+' ':'')}${esc(j.title)}</div>`).join('')}
      ${evs.length>3?`<div class="muted" style="font-size:10px;margin-top:2px">+${evs.length-3} more</div>`:''}
    </div>`);
  }
  document.getElementById('calCells').innerHTML=cells.join('');
}
function renderJobList(){
  const el=document.getElementById('jobList'); const jobs=mineOnly([...DB.jobs]).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(!jobs.length){ el.innerHTML=emptyState('▤','No jobs scheduled','Click a day or “Schedule job”.'); return; }

function custSearch(q){
  const box=document.getElementById('custResults'); if(!box) return;
  const inp=document.getElementById('j_custsearch'); const hid=document.getElementById('j_custId');
  // if the typed text no longer matches the selected customer's name, clear the selection
  const cur=hid.value?custById(hid.value):null;
  if(!(cur && cur.name===inp.value)){ hid.value=''; const ca=document.getElementById('custActions'); if(ca) ca.innerHTML=''; }
  const term=(q||'').trim().toLowerCase();
  let list=DB.customers.slice();
  if(term) list=list.filter(c=>[c.name,c.phone,c.email,c.address].some(f=>(f||'').toLowerCase().includes(term)));
  list=list.sort((a,b)=>a.name.localeCompare(b.name)).slice(0,8);
  let html=list.map(c=>`<div class="sr-item" onclick="chooseCust('${c.id}')"><div class="t-name">${esc(c.name)}</div>${[c.phone,c.address].filter(Boolean).length?`<div class="muted" style="font-size:11px">${esc([c.phone,c.address].filter(Boolean).join(' · '))}</div>`:''}</div>`).join('');
  const exact=term&&DB.customers.some(c=>(c.name||'').toLowerCase()===term);
  if(term&&!exact){ html+=`<div class="sr-item sr-new" onclick="chooseNewCust()">➕ Add “${esc(inp.value.trim())}” as new customer</div>`; }
  if(!html) html=`<div class="sr-item muted">Start typing a name… or <span class="sr-new" onclick="chooseNewCust()">add a new customer</span></div>`;
  box.innerHTML=html; box.classList.remove('hidden');
}

    try{ await upsertCust(nc); }catch(e){ return toast('Could not save new customer: '+e.message); }
    DB.customers.push(nc); customerId=nc.id;
  } else if(!customerId){
    const typed=val('j_custsearch').trim().toLowerCase();

  const bank=bankList()[parseInt(val('i_bank'))||0]||null;
  const type=val('i_type')||'invoice';

  try{ await upsertInv(obj); }catch(e){ return toast('Save failed: '+e.message); }
  if(id){ Object.assign(ex,obj); }
  else { DB.invoices.push(obj);
    if(type==='quote'){ const m=/QUO-(\d+)/.exec(obj.number); if(m) DB.counters.quote=Math.max(DB.counters.quote||0,+m[1]); }

  }

}

async function invoicePdf(id){
  if(!window.html2canvas || !window.jspdf) throw new Error('PDF library not loaded');
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-99999px;top:0;width:780px;background:#fff';
  wrap.innerHTML=invoiceDocHtml(id);
  document.body.appendChild(wrap);
  try{
    const node=wrap.querySelector('.inv-doc');
    const canvas=await html2canvas(node,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
    const img=canvas.toDataURL('image/jpeg',0.92);
    const pdf=new window.jspdf.jsPDF({unit:'pt',format:'a4'});
    const pw=pdf.internal.pageSize.getWidth();
    const ph=canvas.height*(pw/canvas.width);
    pdf.addImage(img,'JPEG',0,0,pw,Math.min(ph,pdf.internal.pageSize.getHeight()));
    const b64=pdf.output('datauristring').split(',')[1].replace(/(.{76})/g,'$1\r\n');
    return { b64, blob:pdf.output('blob') };
  } finally { document.body.removeChild(wrap); }
}
async function storeInvoicePdf(id, blob){
  try{ await sb.storage.from('receipts').upload('invoices/'+id+'.pdf', blob, {upsert:true, contentType:'application/pdf'}); return true; }

}
async function openStoredInvoicePdf(id){
  const {data,error}=await sb.storage.from('receipts').createSignedUrl('invoices/'+id+'.pdf',3600);
  if(error||!data){ toast('No saved PDF yet — use “Save PDF to records” first'); return; }
  window.open(data.signedUrl,'_blank');
}
async function saveInvoicePdf(id){

  const ok=await storeInvoicePdf(id, pdf.blob);
  // also download a local copy
  const u=URL.createObjectURL(pdf.blob); const a=document.createElement('a'); a.href=u; a.download='Invoice-'+(DB.invoices.find(x=>x.id===id)||{}).number+'.pdf'; a.click(); URL.revokeObjectURL(u);
  toast(ok?'Saved to records + downloaded':'Downloaded (storage save failed — check receipts bucket)');
}

async function gmailSend(to,subject,html,text,pdfB64,pdfName){
  const fromName=(DB.settings.businessName||'Invoice').replace(/[\r\n"<>]/g,'');
  const replyTo=(DB.settings.email||'').trim();
  const base=['From: '+fromName+' <'+me.email+'>','To: '+to,(replyTo?'Reply-To: '+replyTo:''),'Subject: '+subject,'MIME-Version: 1.0'].filter(Boolean);
  const alt='alt_'+Math.random().toString(36).slice(2,10);
  const altBody=[
    '--'+alt,'Content-Type: text/plain; charset=UTF-8','Content-Transfer-Encoding: 7bit','',(text||''),'',
    '--'+alt,'Content-Type: text/html; charset=UTF-8','Content-Transfer-Encoding: 7bit','',html,'',
    '--'+alt+'--'].join('\r\n');
  let mime;
  if(pdfB64){
    const mix='mix_'+Math.random().toString(36).slice(2,10);
    mime=base.concat([
      'Content-Type: multipart/mixed; boundary="'+mix+'"','',
      '--'+mix,'Content-Type: multipart/alternative; boundary="'+alt+'"','',altBody,'',
      '--'+mix,'Content-Type: application/pdf; name="'+pdfName+'"','Content-Transfer-Encoding: base64','Content-Disposition: attachment; filename="'+pdfName+'"','',pdfB64,'',
      '--'+mix+'--',''].join('\r\n'));
  } else {
    mime=base.concat(['Content-Type: multipart/alternative; boundary="'+alt+'"','',altBody,'']).join('\r\n');
  }
  const r=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{
    method:'POST',headers:{'Authorization':'Bearer '+GAuth.token,'Content-Type':'application/json'},
    body:JSON.stringify({raw:b64url(mime)})});
  if(r.status===401){ GAuth.token=null; GAuth.connected=false; localStorage.removeItem('mih_gtok'); throw new Error('Google sign-in expired — sign out and back in, then try again'); }
  if(!r.ok){
    const t=await r.text(); let detail=t.slice(0,300);
    if(r.status===400 && /recipient/i.test(t)) detail='The customer’s email address looks invalid or empty. Check it’s a real, correctly-typed address and try again.';
    else if(r.status===403){
      if(/has not been used|is disabled|accessNotConfigured|SERVICE_DISABLED/i.test(t)) detail='Gmail API is not enabled in your Google Cloud project. Enable it (APIs & Services → Library → Gmail API → Enable), then sign out/in.';
      else if(/insufficient|scope|ACCESS_TOKEN_SCOPE/i.test(t)) detail='Email permission not granted. Sign out and back in and approve “Send email on your behalf”.';
    }
    throw new Error('Gmail '+r.status+': '+detail);
  }
  return r.json();
}

const calBase=id=>'https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(id);
async function gcal(url,opts){
  if(!GAuth.token){ GAuth.needReconnect=true; throw new Error('Google calendar not connected'); }
  opts=opts||{}; opts.headers=Object.assign({'Authorization':'Bearer '+GAuth.token,'Content-Type':'application/json'},opts.headers||{});
  const r=await fetch(url,opts);
  if(r.status===401){ GAuth.token=null; GAuth.connected=false; GAuth.needReconnect=true; throw new Error('Google sign-in for calendar expired — click Connect Google again'); }
  if(!r.ok) throw new Error('Google API '+r.status+': '+(await r.text()).slice(0,160));
  return r.status===204?null:r.json();
}
async function loadCalendars(){
  const data=await gcal('https://www.googleapis.com/calendar/v3/users/me/calendarList?minAccessRole=writer&maxResults=250');
  GAuth.calendars=data.items||[];
  if(!DB.settings.googleCalendarId){ const p=GAuth.calendars.find(c=>c.primary)||GAuth.calendars[0]; if(p){ DB.settings.googleCalendarId=p.id; saveSettingsRow(); } }
}
function isoLocal(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function jobToEvent(j){
  const start=new Date((j.date||todayISO())+'T'+(j.time||'09:00')+':00');
  const end=new Date(start.getTime()+((j.duration||2)*3600*1000));
  const c=custById(j.customerId);
  const ev={summary:j.title,description:[(c?'Customer: '+c.name:''),(j.ownerName?'Assigned: '+j.ownerName:''),j.notes||''].filter(Boolean).join('\n'),
    start:{dateTime:start.toISOString()},end:{dateTime:end.toISOString()},
    extendedProperties:{private:{mihJobId:j.id}}};
  if(c&&c.address) ev.location=c.address;
  return ev;
}
function eventToJobFields(ev){
  let date,time='',duration=2;
  if(ev.start&&ev.start.dateTime){ const s=new Date(ev.start.dateTime),e=new Date(ev.end.dateTime);
    date=isoLocal(s); time=String(s.getHours()).padStart(2,'0')+':'+String(s.getMinutes()).padStart(2,'0');
    duration=Math.max(0.5,Math.round((e-s)/360000)/10);
  } else { date=(ev.start&&ev.start.date)||todayISO(); duration=24; }
  return {title:ev.summary||'(no title)',date,time,duration,notes:ev.description||''};
}
async function pushJobToGoogle(j){
  const calId=DB.settings.googleCalendarId; if(!GAuth.connected||!calId) return;
  const ev=jobToEvent(j);
  if(j.googleEventId){
    try{ await gcal(calBase(calId)+'/events/'+encodeURIComponent(j.googleEventId),{method:'PATCH',body:JSON.stringify(ev)}); }
    catch(e){ if(/ 4(0[49]|10)/.test(e.message)){ const cr=await gcal(calBase(calId)+'/events',{method:'POST',body:JSON.stringify(ev)}); j.googleEventId=cr.id; j.calendarId=calId; } else throw e; }
  } else { const cr=await gcal(calBase(calId)+'/events',{method:'POST',body:JSON.stringify(ev)}); j.googleEventId=cr.id; j.calendarId=calId; }
}

async function pullFromGoogle(calId){
  const timeMin=new Date(Date.now()-90*864e5).toISOString(), timeMax=new Date(Date.now()+365*864e5).toISOString();
  let pageToken='',items=[];
  do{ const url=calBase(calId)+'/events?singleEvents=true&showDeleted=true&maxResults=2500&timeMin='+encodeURIComponent(timeMin)+'&timeMax='+encodeURIComponent(timeMax)+(pageToken?'&pageToken='+pageToken:'');
    const data=await gcal(url); items=items.concat(data.items||[]); pageToken=data.nextPageToken||''; }while(pageToken);
  for(const ev of items){
    const mihId=ev.extendedProperties&&ev.extendedProperties.private&&ev.extendedProperties.private.mihJobId;
    const linked=DB.jobs.find(j=>j.googleEventId===ev.id)||(mihId?DB.jobs.find(j=>j.id===mihId):null);
    if(ev.status==='cancelled'){ if(linked){ await delRow('jobs',linked.id); DB.jobs=DB.jobs.filter(j=>j!==linked); } continue; }
    const f=eventToJobFields(ev);
    if(linked){ linked.googleEventId=ev.id; linked.calendarId=calId; if(linked.source==='google'){ Object.assign(linked,f); await upsertJob(linked); } }
    else if(!mihId){ const nj=Object.assign({id:uid(),source:'google',googleEventId:ev.id,calendarId:calId,status:'scheduled',customerId:'',ownerId:me.id,ownerName:me.name},f); DB.jobs.push(nj); await upsertJob(nj); }
  }
}
let syncing=false;
async function syncNow(){
  if(syncing) return;
  if(!GAuth.connected||!GAuth.token){ toast('Reconnect Google for calendar access'); go('settings'); return; }
  syncing=true; updateSyncStatus('Syncing…');
  // make sure we have a calendar; fetch the list and auto-pick if needed
  try{ if(!GAuth.calendars.length) await loadCalendars(); }
  catch(e){ syncing=false; updateSyncStatus(); console.error(e);
    toast('Calendar access failed — reconnect Google. '+(e.message||'')); go('settings'); return; }
  let calId=DB.settings.googleCalendarId || (GAuth.calendars[0]&&GAuth.calendars[0].id);
  if(!calId){ syncing=false; updateSyncStatus();
    toast('No writable Google calendar found — reconnect and tick the calendar permission'); go('settings'); return; }
  DB.settings.googleCalendarId=calId;
  try{
    for(const j of DB.jobs.filter(j=>j.source!=='google'||j.googleEventId)){ await pushJobToGoogle(j); await upsertJob(j); }
    await pullFromGoogle(calId);
    DB.settings.lastSync=new Date().toISOString(); await saveSettingsRow();
    render(); toast('Calendar synced');
  }catch(e){ console.error(e); toast(e.message||'Sync error'); renderSyncCard(); }
  finally{ syncing=false; updateSyncStatus(); }
}

/* ---- Google Sheets sync ---- */
const r2=n=>Math.round((Number(n)||0)*100)/100;
function sheetId(){ const raw=(DB.settings.googleSheetId||'').trim(); const m=/\/d\/([a-zA-Z0-9-_]+)/.exec(raw); return (m?m[1]:raw)||DEFAULT_SHEET; }
async function gsheet(path,method,body){
  if(!GAuth.token) throw new Error('Google not connected — sign out and back in.');
  const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+path,{method:method||'GET',headers:{'Authorization':'Bearer '+GAuth.token,'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  if(r.status===401){ GAuth.token=null; GAuth.connected=false; localStorage.removeItem('mih_gtok'); throw new Error('Google sign-in expired — sign out and back in.'); }
  if(!r.ok){ const t=await r.text();
    if(r.status===403 && /disabled|has not been used|SERVICE_DISABLED/i.test(t)) throw new Error('Google Sheets API not enabled. Enable it in Google Cloud (APIs & Services → Library → Google Sheets API), then sign out/in.');
    if(r.status===404) throw new Error('Sheet not found — check the Sheet link/ID in Settings and that this Google account can edit it.');
    throw new Error('Sheets '+r.status+': '+t.slice(0,150));
  }
  return r.status===204?null:r.json();
}
async function ensureTabs(id,titles){
  const data=await gsheet(id+'?fields=sheets.properties.title');
  const have=(data.sheets||[]).map(s=>s.properties.title);
  const missing=titles.filter(t=>!have.includes(t));
  if(missing.length) await gsheet(id+':batchUpdate','POST',{requests:missing.map(t=>({addSheet:{properties:{title:t}}}))});
}
async function writeTab(id,title,rows){
  await gsheet(id+'/values/'+encodeURIComponent(title)+':clear','POST',{});
  await gsheet(id+'/values/'+encodeURIComponent(title)+'!A1?valueInputOption=RAW','PUT',{values:rows});
}
function sumSheetRows(){
  const paidRev=DB.invoices.filter(i=>i.type!=='quote'&&i.status==='paid').reduce((s,i)=>s+invTotal(i),0);

  const outstanding=DB.invoices.filter(i=>i.type!=='quote'&&i.status!=='paid').reduce((s,i)=>s+invTotal(i),0);
  const partnerBal=DB.loans.filter(l=>l.type==='partner').reduce((s,l)=>s+loanBalance(l.id),0);
  const bizDebt=DB.loans.filter(l=>l.type!=='partner').reduce((s,l)=>s+loanBalance(l.id),0);
  return [['MIH Finances — updated',new Date().toLocaleString('en-AU')],[],
    ['Revenue (paid invoices)',r2(paidRev)],['Total expenses',r2(totalExp)],['Net profit',r2(paidRev-totalExp)],
    ['Outstanding (unpaid invoices)',r2(outstanding)],['Business loans owing',r2(bizDebt)],['Partner loan — Nate owes Mitch',r2(partnerBal)]];

    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal ${wideCls||''}">
        <div class="modal-head"><h3>${esc(title)}</h3><button class="x" onclick="closeModal()">×</button></div>
        <div class="modal-body">${body}</div>
        <div class="modal-foot">${acts.map((a,i)=>`<button class="btn ${a.cls==='danger'?'danger':a.cls==='line'?'line':a.cls==='btn'?'':'ghost'}" data-i="${i}">${esc(a.label)}</button>`).join('')}</div>
      </div></div>`;
  const btns=document.querySelectorAll('.modal-foot button'); acts.forEach((a,i)=>{ btns[i].onclick=a.act; });
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* =====================================================================
   AUTO-UPDATE — checks the deployed file and refreshes when it changes
   ===================================================================== */
let updateVer=null;
async function checkForUpdate(){
  try{
    const r=await fetch(location.pathname+'?_chk='+Date.now(),{cache:'no-store'});
    if(!r.ok) return;
    const txt=await r.text();
    const m=txt.match(/APP_VERSION='([^']+)'/);
    if(m && m[1] && m[1]!==APP_VERSION) showUpdate(m[1]);
  }catch(e){}
}
function showUpdate(v){
  updateVer=v;
  // safe to refresh straight away if the user isn't mid-edit in a dialog
  if(!document.querySelector('.overlay')) return applyUpdate(v);
  if(document.getElementById('updbar')) return;
  const b=document.createElement('div'); b.id='updbar'; b.className='updbar';
  b.innerHTML='🔄 New version ready <button id="updbtn">Update</button>';
  document.body.appendChild(b);
  document.getElementById('updbtn').onclick=()=>applyUpdate(updateVer);
}
function applyUpdate(v){ location.replace(location.pathname+'?v='+encodeURIComponent(v||Date.now())+location.hash); }
setTimeout(checkForUpdate,8000);
setInterval(checkForUpdate,10*60*1000);
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') checkForUpdate(); });

/* ---- go ---- */
boot();
</script>
